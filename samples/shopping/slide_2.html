<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: #FFF;
    padding: 80px;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .tag {
    display: inline-block;
    background: #E74C3C;
    color: #FFF;
    font-size: 20px; font-weight: 700;
    padding: 8px 20px;
    border-radius: 6px;
    margin-bottom: 28px;
    letter-spacing: 3px;
  }

  .product-num {
    font-size: 120px; font-weight: 900;
    color: rgba(231,76,60,0.08);
    line-height: 1;
    margin-bottom: -20px;
  }

  .product-name {
    font-size: 44px; font-weight: 900;
    color: #1A1A1A;
    line-height: 1.3;
    margin-bottom: 20px;
  }

  .product-desc {
    font-size: 28px; font-weight: 400;
    color: #555;
    line-height: 1.7;
    margin-bottom: 36px;
    border-left: 4px solid #E74C3C;
    padding-left: 20px;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
  }

  .original-price {
    font-size: 28px;
    color: #999;
    text-decoration: line-through;
  }

  .sale-price {
    font-size: 52px; font-weight: 900;
    color: #E74C3C;
  }

  .discount {
    display: inline-block;
    background: #FFF200;
    color: #E74C3C;
    font-size: 24px; font-weight: 900;
    padding: 6px 14px;
    border-radius: 6px;
  }

  .reason {
    margin-top: 32px;
    background: #FFF5F5;
    border-radius: 16px;
    padding: 28px;
  }

  .reason-title {
    font-size: 20px; font-weight: 700;
    color: #E74C3C;
    margin-bottom: 12px;
  }

  .reason-text {
    font-size: 24px;
    color: #333;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="slide">
    <span class="tag">PICK 01</span>
    <div class="product-num">01</div>
    <h2 class="product-name">무선 미니 가습기</h2>
    <p class="product-desc">USB 충전식으로 어디든 들고 다닐 수 있는<br>초소형 가습기. 사무실 필수템으로 등극!</p>
    <div class="price-row">
      <span class="original-price">29,900원</span>
      <span class="sale-price">12,900원</span>
      <span class="discount">57% OFF</span>
    </div>
    <div class="reason">
      <div class="reason-title">추천 이유</div>
      <div class="reason-text">배터리 8시간 지속, 무소음 설계라서<br>사무실에서 옆 사람 눈치 안 봐도 돼요</div>
    </div>
  </div>
</body>
</html>
