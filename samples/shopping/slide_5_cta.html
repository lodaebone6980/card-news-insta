<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: linear-gradient(160deg, #E74C3C, #C0392B);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px;
  }

  .heading {
    font-size: 52px; font-weight: 900;
    color: #FFF;
    line-height: 1.4;
    margin-bottom: 40px;
  }

  .divider {
    width: 80px; height: 3px;
    background: rgba(255,255,255,0.4);
    margin-bottom: 40px;
  }

  .body {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
    margin-bottom: 60px;
  }

  .cta-box {
    background: #FFF;
    border-radius: 20px;
    padding: 32px 48px;
  }

  .cta-text {
    font-size: 28px; font-weight: 700;
    color: #E74C3C;
  }
</style>
</head>
<body>
  <div class="slide">
    <h2 class="heading">가격은 계속 바뀌니까<br>지금이 제일 싸요</h2>
    <div class="divider"></div>
    <p class="body">저장해두고 하나씩 장바구니에 담아보세요</p>
    <div class="cta-box">
      <span class="cta-text">팔로우하면 매주 꿀딜 알려드려요</span>
    </div>
  </div>
</body>
</html>
