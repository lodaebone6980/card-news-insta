<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: linear-gradient(160deg, #FF6B6B 0%, #E74C3C 50%, #C0392B 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    position: relative; overflow: hidden;
  }

  .deco-circle {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .deco-circle.c1 { width: 500px; height: 500px; top: -100px; right: -150px; }
  .deco-circle.c2 { width: 300px; height: 300px; bottom: -50px; left: -80px; }
  .deco-circle.c3 { width: 200px; height: 200px; top: 40%; left: -60px; }

  .badge {
    display: inline-block;
    background: #FFF;
    color: #E74C3C;
    font-size: 26px; font-weight: 900;
    padding: 12px 32px;
    border-radius: 50px;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  .num {
    font-size: 180px; font-weight: 900;
    color: rgba(255,255,255,0.15);
    line-height: 1;
    margin-bottom: -30px;
  }

  .heading {
    font-size: 62px; font-weight: 900;
    color: #FFF;
    line-height: 1.3;
    margin-bottom: 24px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .sub {
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }

  .price-tag {
    position: absolute; bottom: 80px; right: 80px;
    background: #FFF200;
    color: #E74C3C;
    font-size: 32px; font-weight: 900;
    padding: 16px 30px;
    border-radius: 12px;
    transform: rotate(-5deg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="deco-circle c1"></div>
    <div class="deco-circle c2"></div>
    <div class="deco-circle c3"></div>
    <span class="badge">MUST BUY</span>
    <div class="num">TOP5</div>
    <h1 class="heading">2026 봄<br>가성비 꿀템 모음</h1>
    <p class="sub">안 사면 후회할 역대급 가성비</p>
    <div class="price-tag">최대 70% OFF</div>
  </div>
</body>
</html>
