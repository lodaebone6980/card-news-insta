<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: linear-gradient(160deg, #0F0A2E 0%, #1B1464 40%, #2D1B69 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    position: relative; overflow: hidden;
  }

  /* 별 장식 */
  .star {
    position: absolute;
    width: 4px; height: 4px;
    background: #FFF;
    border-radius: 50%;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.3);
  }
  .star:nth-child(1) { top: 8%; left: 15%; width: 3px; height: 3px; }
  .star:nth-child(2) { top: 15%; right: 20%; width: 5px; height: 5px; }
  .star:nth-child(3) { top: 25%; left: 30%; width: 2px; height: 2px; }
  .star:nth-child(4) { bottom: 30%; right: 15%; width: 4px; height: 4px; }
  .star:nth-child(5) { bottom: 20%; left: 20%; width: 3px; height: 3px; }
  .star:nth-child(6) { top: 40%; right: 10%; width: 2px; height: 2px; }

  .moon {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFF8DC, #FFD700);
    box-shadow: 0 0 60px 20px rgba(255,215,0,0.2), 0 0 120px 60px rgba(255,215,0,0.08);
    margin-bottom: 48px;
  }

  .badge {
    display: inline-block;
    border: 2px solid rgba(255,215,0,0.5);
    color: #FFD700;
    font-size: 22px; font-weight: 700;
    padding: 10px 28px;
    border-radius: 50px;
    margin-bottom: 36px;
    letter-spacing: 4px;
  }

  .heading {
    font-size: 60px; font-weight: 900;
    color: #FFF;
    line-height: 1.35;
    margin-bottom: 28px;
    text-shadow: 0 0 40px rgba(255,215,0,0.15);
  }

  .sub {
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }

  .year {
    position: absolute;
    bottom: 80px;
    font-size: 22px; font-weight: 700;
    color: rgba(255,215,0,0.3);
    letter-spacing: 6px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="moon"></div>
    <span class="badge">FORTUNE 2026</span>
    <h1 class="heading">2026년 띠별<br>3월 운세 총정리</h1>
    <p class="sub">당신의 띠를 찾아보세요</p>
    <span class="year">丙午年 三月</span>
  </div>
</body>
</html>
