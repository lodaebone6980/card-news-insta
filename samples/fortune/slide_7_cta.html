<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: linear-gradient(160deg, #2D1B69, #1B1464);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px;
    position: relative;
  }

  .star { position: absolute; width: 3px; height: 3px; background: #FFF; border-radius: 50%; box-shadow: 0 0 4px rgba(255,255,255,0.3); }
  .star:nth-child(1) { top: 12%; left: 18%; }
  .star:nth-child(2) { top: 22%; right: 25%; width: 4px; height: 4px; }
  .star:nth-child(3) { bottom: 25%; left: 22%; }
  .star:nth-child(4) { bottom: 35%; right: 18%; width: 2px; height: 2px; }

  .heading {
    font-size: 50px; font-weight: 900;
    color: #FFF;
    line-height: 1.4;
    margin-bottom: 36px;
  }

  .gold { color: #FFD700; }

  .divider {
    width: 60px; height: 2px;
    background: rgba(255,215,0,0.4);
    margin-bottom: 36px;
  }

  .body {
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    margin-bottom: 60px;
  }

  .cta-box {
    border: 2px solid #FFD700;
    border-radius: 16px;
    padding: 28px 44px;
  }

  .cta-text {
    font-size: 26px; font-weight: 700;
    color: #FFD700;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div>
    <h2 class="heading">운은 <span class="gold">아는 만큼</span><br>대비할 수 있어요</h2>
    <div class="divider"></div>
    <p class="body">저장해두고 매달 확인하세요<br>친구 띠도 찾아서 공유해보세요</p>
    <div class="cta-box">
      <span class="cta-text">팔로우하면 매월 운세를 보내드려요</span>
    </div>
  </div>
</body>
</html>
