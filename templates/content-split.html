<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: {{ sub_color }};
  padding: 70px 72px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: {{ main_color }}; }
.slide-header { margin-bottom: 44px; flex-shrink: 0; }
.slide-header-meta {
  font-size: 22px; font-weight: 700;
  color: {{ main_color }}; letter-spacing: 2px; margin-bottom: 12px;
}
.heading {
  font-size: 56px; font-weight: 900;
  color: #fff; line-height: 1.2;
  letter-spacing: -1px; word-break: keep-all;
}
.split {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 24px; flex: 1;
}
.split-col {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 36px 32px;
  display: flex; flex-direction: column; gap: 16px;
}
.split-col.highlighted {
  background: {{ main_color }}18;
  border-color: {{ main_color }}55;
  border-width: 2px;
}
.col-header {
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 4px;
}
.col-title {
  font-size: 30px; font-weight: 700;
  color: rgba(255,255,255,0.5);
}
.split-col.highlighted .col-title { color: {{ main_color }}; }
.col-items { display: flex; flex-direction: column; gap: 14px; }
.col-item {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 26px; color: rgba(255,255,255,0.65); line-height: 1.4;
}
.split-col.highlighted .col-item { color: rgba(255,255,255,0.85); }
.col-item::before {
  content: '·';
  color: rgba(255,255,255,0.2);
  font-size: 32px; line-height: 1; flex-shrink: 0;
}
.split-col.highlighted .col-item::before { color: {{ main_color }}; }
.footer {
  margin-top: 24px; padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between;
  font-size: 22px; color: rgba(255,255,255,0.2); flex-shrink: 0;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="slide-header">
    <div class="slide-header-meta">{{ category_tag }}</div>
    <div class="heading">{{ heading }}</div>
  </div>
  <div class="split">
    <div class="split-col">
      <div class="col-header">
        <div class="col-title">{{ left_title }}</div>
      </div>
      <div class="col-items">
        {% for item in left_items %}
        <div class="col-item">{{ item }}</div>
        {% endfor %}
      </div>
    </div>
    <div class="split-col highlighted">
      <div class="col-header">
        <div class="col-title">{{ right_title }}</div>
      </div>
      <div class="col-items">
        {% for item in right_items %}
        <div class="col-item">{{ item }}</div>
        {% endfor %}
      </div>
    </div>
  </div>
  <div class="footer">
    <span>{{ brand_name }}</span>
    <span>{{ slide_number }} / {{ total_slides }}</span>
  </div>
</div>
</body>
</html>
