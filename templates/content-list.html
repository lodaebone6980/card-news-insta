<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: {{ sub_color }};
  padding: 70px 72px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  background: {{ main_color }};
}
.deco {
  position: absolute; right: -80px; bottom: -80px;
  width: 400px; height: 400px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
}
.card-header {
  display: flex; align-items: center; gap: 18px;
  padding-bottom: 32px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 36px; flex-shrink: 0;
}
.header-icon { font-size: 44px; line-height: 1; }
.header-text { flex: 1; }
.header-tag {
  font-size: 20px; font-weight: 700;
  color: {{ main_color }}; letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.heading {
  font-size: 50px; font-weight: 900;
  color: #ffffff; line-height: 1.2;
  letter-spacing: -1px; word-break: keep-all;
}
.slide-num-badge {
  font-size: 22px; color: rgba(255,255,255,0.2);
  font-weight: 700; letter-spacing: 1px; flex-shrink: 0;
}
.list {
  display: flex; flex-direction: column;
  gap: 18px; flex: 1;
}
.list-item {
  display: flex; align-items: center; gap: 20px;
  padding: 24px 28px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.07);
}
.list-item.rank-1 {
  background: rgba(255,255,255,0.09);
  border-color: {{ main_color }}44;
  border-width: 2px;
}
.rank-badge {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.4);
  font-size: 24px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.list-item.rank-1 .rank-badge {
  background: {{ main_color }};
  color: #fff; font-size: 26px;
}
.item-content { flex: 1; }
.item-title {
  font-size: 32px; font-weight: 700;
  color: #ffffff; line-height: 1.25;
  word-break: keep-all;
}
.list-item.rank-1 .item-title { font-size: 34px; }
.item-desc {
  font-size: 24px; color: rgba(255,255,255,0.45);
  margin-top: 6px; line-height: 1.4;
}
.item-arrow {
  font-size: 26px; color: rgba(255,255,255,0.15); flex-shrink: 0;
}
.list-item.rank-1 .item-arrow { color: {{ main_color }}; }
.footer {
  margin-top: 24px; padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 22px; color: rgba(255,255,255,0.2); flex-shrink: 0;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="deco"></div>
  <div class="card-header">
    <div class="header-icon">{{ category_tag }}</div>
    <div class="header-text">
      <div class="header-tag">RANKING</div>
      <div class="heading">{{ heading }}</div>
    </div>
    <div class="slide-num-badge">{{ slide_number }}/{{ total_slides }}</div>
  </div>
  <div class="list">
    {% for item in items %}
    <div class="list-item {% if loop.index == 1 %}rank-1{% endif %}">
      <div class="rank-badge">{{ loop.index }}</div>
      <div class="item-content">
        <div class="item-title">{{ item.title }}</div>
        {% if item.desc %}
        <div class="item-desc">{{ item.desc }}</div>
        {% endif %}
      </div>
      <div class="item-arrow">›</div>
    </div>
    {% endfor %}
  </div>
  <div class="footer">
    <span>{{ brand_name }}</span>
    <span>저장하고 친구한테 공유해봐 💾</span>
  </div>
</div>
</body>
</html>
