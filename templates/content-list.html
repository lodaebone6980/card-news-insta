<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: {{ sub_color }};
    padding: 80px;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 6px;
    background: {{ main_color }};
  }

  .footer {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; justify-content: space-between;
    font-size: 16px; color: #999;
  }

  .heading {
    font-size: 40px; font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .list {
    display: flex; flex-direction: column;
    gap: 16px;
  }

  .list-item {
    display: flex; align-items: flex-start; gap: 20px;
    background: #FFF;
    border-radius: 16px;
    padding: 24px 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .list-num {
    width: 44px; height: 44px;
    background: {{ main_color }};
    color: #FFF;
    font-size: 20px; font-weight: 900;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .list-content {
    flex: 1;
  }

  .list-title {
    font-size: 24px; font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 6px;
  }

  .list-desc {
    font-size: 20px; color: #666;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="accent-bar"></div>
    <h2 class="heading">{{ heading }}</h2>
    <div class="list">
      {% for item in items %}
      <div class="list-item">
        <div class="list-num">{{ loop.index }}</div>
        <div class="list-content">
          <div class="list-title">{{ item.title }}</div>
          <div class="list-desc">{{ item.desc }}</div>
        </div>
      </div>
      {% endfor %}
    </div>
    <div class="footer">
      <span>{{ brand_name }}</span>
      <span>{{ slide_number }} / {{ total_slides }}</span>
    </div>
  </div>
</body>
</html>
