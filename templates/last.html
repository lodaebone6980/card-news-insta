<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: #080808;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 80px;
  position: relative; overflow: hidden;
}
.bg-glow {
  position: absolute; width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient({{ main_color }}14, transparent 65%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.bg-ring-1 {
  position: absolute; width: 800px; height: 800px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.bg-ring-2 {
  position: absolute; width: 1100px; height: 1100px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.025);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.bottom-glow {
  position: absolute; bottom: -200px; left: -100px; right: -100px;
  height: 500px; border-radius: 50%;
  background: radial-gradient({{ main_color }}16, transparent 70%);
}
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: {{ main_color }}; }
.slide-num {
  position: absolute; top: 48px; right: 72px;
  font-size: 22px; color: rgba(255,255,255,0.15);
  font-weight: 700; letter-spacing: 2px; z-index: 3;
}
.content { position: relative; z-index: 2; width: 100%; }
.save-icon { font-size: 100px; line-height: 1; margin-bottom: 32px; }
.main-title {
  font-size: 88px; font-weight: 900;
  color: #fff; line-height: 1.15;
  letter-spacing: -2px; word-break: keep-all; margin-bottom: 20px;
}
.main-title .accent { color: {{ main_color }}; }
.sub-title {
  font-size: 34px; color: rgba(255,255,255,0.4);
  line-height: 1.7; margin-bottom: 56px; word-break: keep-all;
}
.cta-button {
  display: inline-block;
  background: {{ main_color }};
  color: #fff;
  font-size: 32px; font-weight: 700;
  padding: 22px 56px; border-radius: 14px;
  letter-spacing: .5px; margin-bottom: 24px;
}
.cta-secondary { font-size: 26px; color: rgba(255,255,255,0.3); }
.divider { width: 100%; height: 1px; background: rgba(255,255,255,0.07); margin: 48px 0; }
.instagram-handle {
  font-size: 28px; font-weight: 700;
  color: rgba(255,255,255,0.3); letter-spacing: 1px;
}
.instagram-handle span { color: {{ main_color }}; }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="bg-glow"></div>
  <div class="bg-ring-1"></div>
  <div class="bg-ring-2"></div>
  <div class="bottom-glow"></div>
  <div class="slide-num">{{ slide_number }}/{{ total_slides }}</div>
  <div class="content">
    <div class="save-icon">💾</div>
    <div class="main-title">
      저장하고<br><span class="accent">써먹으세요</span>
    </div>
    <div class="sub-title">
      {{ body }}<br>
      친구한테 공유도 부탁드려요 🙏
    </div>
    <div class="cta-button">팔로우하면 계속 옵니다 →</div>
    <div class="cta-secondary">매주 유용한 정보 모아드려요</div>
    <div class="divider"></div>
    <div class="instagram-handle">
      <span>@</span>{{ instagram_handle }}
    </div>
  </div>
</div>
</body>
</html>
