<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: {{ sub_color }};
    padding: 80px;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 6px;
    background: {{ main_color }};
  }

  .footer {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; justify-content: space-between;
    font-size: 16px; color: #999;
  }

  .heading {
    font-size: 40px; font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .grid-item {
    background: #FFF;
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .grid-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }

  .grid-title {
    font-size: 24px; font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 10px;
  }

  .grid-desc {
    font-size: 20px;
    color: #666;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="accent-bar"></div>
    <h2 class="heading">{{ heading }}</h2>
    <div class="grid">
      {% for item in items %}
      <div class="grid-item">
        <div class="grid-icon">{{ item.icon }}</div>
        <div class="grid-title">{{ item.title }}</div>
        <div class="grid-desc">{{ item.desc }}</div>
      </div>
      {% endfor %}
    </div>
    <div class="footer">
      <span>{{ brand_name }}</span>
      <span>{{ slide_number }} / {{ total_slides }}</span>
    </div>
  </div>
</body>
</html>
