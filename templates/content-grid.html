<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: {{ sub_color }};
  padding: 70px 72px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  background: {{ main_color }};
}
.slide-header { margin-bottom: 44px; flex-shrink: 0; }
.slide-header-meta {
  font-size: 22px; font-weight: 700;
  color: {{ main_color }}; letter-spacing: 2px; margin-bottom: 12px;
}
.heading {
  font-size: 58px; font-weight: 900;
  color: #fff; line-height: 1.2;
  letter-spacing: -1px; word-break: keep-all;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 20px; flex: 1;
}
.grid-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 36px 32px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  position: relative; overflow: hidden;
}
.grid-card:nth-child(1) {
  background: {{ main_color }}18;
  border-color: {{ main_color }}44;
}
.card-num {
  font-size: 72px; font-weight: 900;
  color: rgba(255,255,255,0.07);
  line-height: 1;
  position: absolute; bottom: 20px; right: 24px;
}
.grid-card:nth-child(1) .card-num { color: {{ main_color }}22; }
.card-title {
  font-size: 30px; font-weight: 700;
  color: #fff; line-height: 1.3;
  word-break: keep-all;
  position: relative; z-index: 1;
}
.grid-card:nth-child(1) .card-title { font-size: 32px; }
.card-desc {
  font-size: 22px; color: rgba(255,255,255,0.45);
  line-height: 1.5; margin-top: 10px;
  word-break: keep-all;
  position: relative; z-index: 1;
}
.card-badge {
  display: inline-block;
  background: {{ main_color }};
  color: #fff;
  font-size: 18px; font-weight: 700;
  padding: 5px 14px; border-radius: 6px;
  margin-bottom: 16px; letter-spacing: .5px;
  width: fit-content;
}
.footer {
  margin-top: 24px; padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between;
  font-size: 22px; color: rgba(255,255,255,0.2); flex-shrink: 0;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="slide-header">
    <div class="slide-header-meta">{{ category_tag }}</div>
    <div class="heading">{{ heading }}</div>
  </div>
  <div class="grid">
    {% for item in items %}
    <div class="grid-card">
      {% if loop.index == 1 %}
      <div class="card-badge">핵심</div>
      {% endif %}
      <div class="card-num">{{ loop.index }}</div>
      <div>
        <div class="card-title">{{ item.title }}</div>
        {% if item.desc %}
        <div class="card-desc">{{ item.desc }}</div>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="footer">
    <span>{{ brand_name }}</span>
    <span>{{ slide_number }} / {{ total_slides }}</span>
  </div>
</div>
</body>
</html>
