<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: {{ sub_color }};
  padding: 90px 80px;
  display: flex; flex-direction: column;
  justify-content: center;
  position: relative; overflow: hidden;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  background: {{ main_color }};
}
.deco {
  position: absolute; right: -100px; bottom: -100px;
  width: 500px; height: 500px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
}
.deco2 {
  position: absolute; right: -200px; bottom: -200px;
  width: 750px; height: 750px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.025);
}
.step-badge {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 40px;
}
.step-num {
  width: 48px; height: 48px; border-radius: 12px;
  background: {{ main_color }};
  color: #fff; font-size: 22px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
}
.step-label {
  font-size: 24px; font-weight: 700;
  color: {{ main_color }};
  letter-spacing: 1px;
}
.heading {
  font-size: 68px; font-weight: 900;
  color: #ffffff; line-height: 1.2;
  margin-bottom: 32px;
  letter-spacing: -1.5px;
  word-break: keep-all;
}
.divider {
  width: 50px; height: 4px;
  background: {{ main_color }};
  border-radius: 2px; margin-bottom: 36px;
}
.body {
  font-size: 34px; font-weight: 400;
  color: rgba(255,255,255,0.6);
  line-height: 1.75;
  word-break: keep-all;
}
.body strong { color: #fff; font-weight: 700; }
.footer {
  position: absolute; bottom: 48px; left: 80px; right: 80px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 22px; color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="deco"></div>
  <div class="deco2"></div>
  <div class="step-badge">
    <div class="step-num">{{ slide_number }}</div>
    <div class="step-label">{{ category_tag }}</div>
  </div>
  <h2 class="heading">{{ heading }}</h2>
  <div class="divider"></div>
  <p class="body">{{ body }}</p>
  <div class="footer">
    <span>{{ brand_name }}</span>
    <span>{{ slide_number }} / {{ total_slides }}</span>
  </div>
</div>
</body>
</html>
