<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: {{ main_color }};
    padding: 100px;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .footer {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; justify-content: space-between;
    font-size: 16px; color: rgba(255,255,255,0.4);
  }

  .quote-mark {
    font-size: 120px; font-weight: 900;
    color: rgba(255,255,255,0.15);
    line-height: 0.8;
    margin-bottom: 20px;
  }

  .quote-text {
    font-size: 42px; font-weight: 700;
    color: #FFF;
    line-height: 1.5;
    margin-bottom: 40px;
  }

  .divider {
    width: 60px; height: 3px;
    background: rgba(255,255,255,0.3);
    margin-bottom: 28px;
  }

  .quote-source {
    font-size: 24px;
    color: rgba(255,255,255,0.65);
  }

  .body {
    margin-top: 36px;
    font-size: 26px;
    color: rgba(255,255,255,0.8);
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="quote-mark">"</div>
    <p class="quote-text">{{ quote }}</p>
    <div class="divider"></div>
    <p class="quote-source">{{ quote_source }}</p>
    {% if body %}<p class="body">{{ body }}</p>{% endif %}
    <div class="footer">
      <span>{{ brand_name }}</span>
      <span>{{ slide_number }} / {{ total_slides }}</span>
    </div>
  </div>
</body>
</html>
