<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: {{ sub_color }};
  padding: 90px 80px;
  display: flex; flex-direction: column;
  justify-content: center;
  position: relative; overflow: hidden;
}
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: {{ main_color }}; }
.deco-quote-bg {
  position: absolute; top: 60px; right: 60px;
  font-size: 400px; font-weight: 900; line-height: 1;
  color: rgba(255,255,255,0.025);
  font-family: Georgia, serif; pointer-events: none;
}
.deco-left {
  position: absolute; left: 0; top: 200px; bottom: 200px;
  width: 8px; background: {{ main_color }};
}
.category-tag {
  font-size: 22px; font-weight: 700;
  color: {{ main_color }}; letter-spacing: 2px; margin-bottom: 48px;
}
.quote-mark {
  font-size: 120px; color: {{ main_color }};
  line-height: 0.7; margin-bottom: 24px;
  font-family: Georgia, serif;
}
.quote {
  font-size: 56px; font-weight: 900;
  color: #ffffff; line-height: 1.35;
  letter-spacing: -1px; word-break: keep-all; margin-bottom: 40px;
}
.quote-source { display: flex; align-items: center; gap: 16px; }
.source-bar { width: 40px; height: 4px; background: {{ main_color }}; border-radius: 2px; }
.source-text { font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.45); }
.divider { width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 48px 0; }
.body { font-size: 30px; color: rgba(255,255,255,0.5); line-height: 1.75; word-break: keep-all; }
.footer {
  position: absolute; bottom: 48px; left: 80px; right: 80px;
  display: flex; justify-content: space-between;
  font-size: 22px; color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="deco-quote-bg">"</div>
  <div class="deco-left"></div>
  <div class="category-tag">{{ category_tag }}</div>
  <div class="quote-mark">"</div>
  <div class="quote">{{ quote }}</div>
  {% if quote_source %}
  <div class="quote-source">
    <div class="source-bar"></div>
    <div class="source-text">{{ quote_source }}</div>
  </div>
  {% endif %}
  {% if body %}
  <div class="divider"></div>
  <p class="body">{{ body }}</p>
  {% endif %}
  <div class="footer">
    <span>{{ brand_name }}</span>
    <span>{{ slide_number }} / {{ total_slides }}</span>
  </div>
</div>
</body>
</html>
