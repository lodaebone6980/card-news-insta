<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: {{ sub_color }};
    padding: 80px;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 6px;
    background: {{ main_color }};
  }

  .footer {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; justify-content: space-between;
    font-size: 16px; color: #999;
  }

  .category-tag {
    display: inline-block;
    font-size: 20px; font-weight: 700;
    color: {{ main_color }};
    letter-spacing: 3px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .big-number {
    font-size: 120px; font-weight: 900;
    color: {{ main_color }};
    line-height: 1;
    margin-bottom: 12px;
  }

  .big-unit {
    font-size: 48px; font-weight: 700;
    color: {{ main_color }};
    opacity: 0.7;
    margin-bottom: 32px;
  }

  .heading {
    font-size: 40px; font-weight: 900;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 24px;
  }

  .body {
    font-size: 26px; color: #555;
    line-height: 1.7;
  }

  .source {
    margin-top: 28px;
    font-size: 18px; color: #999;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="accent-bar"></div>
    <span class="category-tag">{{ category_tag }}</span>
    <div class="big-number">{{ stat_number }}</div>
    <div class="big-unit">{{ stat_unit }}</div>
    <h2 class="heading">{{ heading }}</h2>
    <p class="body">{{ body }}</p>
    {% if source %}<p class="source">출처: {{ source }}</p>{% endif %}
    <div class="footer">
      <span>{{ brand_name }}</span>
      <span>{{ slide_number }} / {{ total_slides }}</span>
    </div>
  </div>
</body>
</html>
