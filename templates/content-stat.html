<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: {{ sub_color }};
  padding: 80px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  position: relative; overflow: hidden;
}
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: {{ main_color }}; }
.bg-circle {
  position: absolute; width: 800px; height: 800px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.bg-circle-inner {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.glow {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient({{ main_color }}12, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.category-tag {
  font-size: 24px; font-weight: 700;
  color: {{ main_color }}; letter-spacing: 3px;
  margin-bottom: 40px; position: relative; z-index: 2;
}
.stat-number {
  font-size: 200px; font-weight: 900;
  color: {{ main_color }};
  line-height: 0.9; letter-spacing: -8px;
  position: relative; z-index: 2;
}
.stat-unit {
  font-size: 60px; font-weight: 900;
  color: rgba(255,255,255,0.7);
  margin-top: 8px; position: relative; z-index: 2;
}
.divider {
  width: 80px; height: 4px; background: {{ main_color }};
  border-radius: 2px; margin: 40px auto;
  position: relative; z-index: 2;
}
.heading {
  font-size: 52px; font-weight: 900;
  color: #fff; line-height: 1.3;
  letter-spacing: -1px; word-break: keep-all;
  position: relative; z-index: 2; margin-bottom: 24px;
}
.body {
  font-size: 30px; color: rgba(255,255,255,0.5);
  line-height: 1.6; word-break: keep-all;
  position: relative; z-index: 2;
}
.footer {
  position: absolute; bottom: 48px; left: 80px; right: 80px;
  display: flex; justify-content: space-between;
  font-size: 22px; color: rgba(255,255,255,0.2); z-index: 2;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle-inner"></div>
  <div class="glow"></div>
  <div class="category-tag">{{ category_tag }}</div>
  <div class="stat-number">{{ stat_number }}</div>
  {% if stat_unit %}<div class="stat-unit">{{ stat_unit }}</div>{% endif %}
  <div class="divider"></div>
  <h2 class="heading">{{ heading }}</h2>
  <p class="body">{{ body }}</p>
  <div class="footer">
    <span>{{ brand_name }}</span>
    <span>{{ slide_number }} / {{ total_slides }}</span>
  </div>
</div>
</body>
</html>
