<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }
.slide {
  width: 1080px; height: 1350px;
  background: #0a0a0a;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 90px 80px;
  overflow: hidden;
}
.bg-image {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}
.bg-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.45) 40%, rgba(0,0,0,0.88) 75%, rgba(0,0,0,0.96) 100%);
  z-index: 1;
}
.bg-gradient {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #0a0a0a 30%, #1a1a1a 100%);
  z-index: 0;
}
.deco-ring-1 {
  position: absolute; right: -120px; top: -120px;
  width: 600px; height: 600px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04); z-index: 1;
}
.deco-ring-2 {
  position: absolute; right: -220px; top: -220px;
  width: 900px; height: 900px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.025); z-index: 1;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  background: {{ main_color }}; z-index: 3;
}
.slide-num {
  position: absolute; top: 48px; right: 72px;
  font-size: 22px; color: rgba(255,255,255,0.2);
  font-weight: 700; letter-spacing: 2px; z-index: 3;
}
.content { position: relative; z-index: 3; }
.category-tag {
  display: inline-block;
  background: {{ main_color }};
  color: #fff;
  font-size: 26px; font-weight: 700;
  padding: 10px 24px; border-radius: 8px;
  letter-spacing: 1px;
  margin-bottom: 36px;
}
.heading {
  font-size: 80px; font-weight: 900;
  color: #ffffff; line-height: 1.15;
  margin-bottom: 28px;
  letter-spacing: -2px;
  word-break: keep-all;
  text-shadow: 0 2px 20px rgba(0,0,0,0.4);
}
.divider {
  width: 60px; height: 5px;
  background: {{ main_color }};
  border-radius: 3px;
  margin-bottom: 28px;
}
.body {
  font-size: 34px; font-weight: 400;
  color: rgba(255,255,255,0.55);
  line-height: 1.6;
}
.brand {
  position: absolute; top: 48px; left: 72px;
  font-size: 24px; font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px; z-index: 3;
}
</style>
</head>
<body>
<div class="slide">
  {% if image_path %}
  <img class="bg-image" src="{{ image_path }}" alt="">
  <div class="bg-overlay"></div>
  {% else %}
  <div class="bg-gradient"></div>
  {% endif %}
  <div class="deco-ring-1"></div>
  <div class="deco-ring-2"></div>
  <div class="top-bar"></div>
  <div class="brand">{{ brand_name }}</div>
  <div class="slide-num">01</div>
  <div class="content">
    {% if category_tag %}
    <div class="category-tag">{{ category_tag }}</div>
    {% endif %}
    <h1 class="heading">{{ heading }}</h1>
    <div class="divider"></div>
    <p class="body">{{ body }}</p>
  </div>
</div>
</body>
</html>
