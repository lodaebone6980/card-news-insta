<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 80px;
  }

  .background-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.1) 0%,
      rgba(0, 0, 0, 0.3) 40%,
      rgba(0, 0, 0, 0.7) 100%
    );
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
  }

  .brand-tag {
    display: inline-block;
    background: {{ main_color }};
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 6px;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  .heading {
    font-size: 64px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 24px;
    word-break: keep-all;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  .body {
    font-size: 32px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
  }
</style>
</head>
<body>
  <div class="slide">
    <img class="background-image" src="{{ image_path }}" alt="cover background">
    <div class="overlay"></div>
    <div class="content">
      <span class="brand-tag">{{ brand_name }}</span>
      <h1 class="heading">{{ heading }}</h1>
      <p class="body">{{ body }}</p>
    </div>
  </div>
</body>
</html>
